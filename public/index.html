<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery Label Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 600px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #1a202c;
    }

    .subtitle {
      color: #718096;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .status-card {
      background: #f7fafc;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      border-left: 4px solid #667eea;
    }

    .status-card h3 {
      font-size: 14px;
      color: #4a5568;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-card .value {
      font-size: 32px;
      font-weight: bold;
      color: #1a202c;
    }

    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-bottom: 20px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .spinner {
      display: none;
      border: 3px solid rgba(255,255,255,0.3);
      border-top: 3px solid white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .message {
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: none;
    }

    .message.success {
      background: #c6f6d5;
      color: #22543d;
      border-left: 4px solid #38a169;
    }

    .message.error {
      background: #fed7d7;
      color: #742a2a;
      border-left: 4px solid #e53e3e;
    }

    .message.show {
      display: block;
    }

    .files-list {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 2px solid #e2e8f0;
    }

    .files-list h2 {
      font-size: 18px;
      margin-bottom: 15px;
      color: #1a202c;
    }

    .file-item {
      background: #f7fafc;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s;
    }

    .file-item:hover {
      background: #edf2f7;
    }

    .file-name {
      font-size: 14px;
      color: #2d3748;
      font-family: 'Courier New', monospace;
    }

    .download-link {
      color: #667eea;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .download-link:hover {
      background: #667eea;
      color: white;
    }

    .footer {
      margin-top: 30px;
      text-align: center;
      color: #a0aec0;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📦 Delivery Labels</h1>
    <p class="subtitle">Click when ready - generates labels for tomorrow's deliveries</p>

    <div class="status-card">
      <h3>Manual Control</h3>
      <div class="value" id="deliveryCount">Click to generate</div>
    </div>

    <div id="message" class="message"></div>

    <button class="btn" id="generateBtn" onclick="generateLabels()">
      <span id="btnText">Generate Labels for Tomorrow</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="files-list" id="filesList" style="display: none;">
      <h2>Recent Files</h2>
      <div id="filesContainer"></div>
    </div>

    <div class="footer">
      Connected to Zoho Books • Filename = Tomorrow's Date • Click only when ready to print
    </div>
  </div>

  <script>
    let isGenerating = false;

    async function generateLabels() {
      if (isGenerating) return;

      isGenerating = true;
      const btn = document.getElementById('generateBtn');
      const btnText = document.getElementById('btnText');
      const spinner = document.getElementById('spinner');
      const message = document.getElementById('message');

      // Update UI
      btn.disabled = true;
      btnText.style.display = 'none';
      spinner.style.display = 'block';
      message.classList.remove('show', 'success', 'error');

      try {
        const response = await fetch('/api/generate-labels');
        const data = await response.json();

        if (data.success) {
          // Success message with filename
          message.className = 'message success show';
          message.textContent = `✓ Generated: ${data.filename} (${data.count} deliveries) - Downloading...`;

          // Update count
          document.getElementById('deliveryCount').textContent = `Last: ${data.count} labels`;

          // Auto-download the file
          if (data.downloadUrl) {
            window.location.href = data.downloadUrl;
          }

          // Refresh file list
          loadRecentFiles();
        } else {
          throw new Error(data.error || 'Unknown error');
        }
      } catch (error) {
        message.className = 'message error show';
        message.textContent = `✗ Error: ${error.message}`;
      } finally {
        // Reset UI
        btn.disabled = false;
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
        isGenerating = false;
      }
    }

    async function loadRecentFiles() {
      try {
        const response = await fetch('/api/files');
        const data = await response.json();

        if (data.files && data.files.length > 0) {
          const container = document.getElementById('filesContainer');
          container.innerHTML = data.files.map(file => `
            <div class="file-item">
              <span class="file-name">${file.name}</span>
              <a href="${file.downloadUrl}" class="download-link">Download</a>
            </div>
          `).join('');

          document.getElementById('filesList').style.display = 'block';
        }
      } catch (error) {
        console.error('Failed to load files:', error);
      }
    }

    // Load files on page load
    loadRecentFiles();
  </script>
</body>
</html>
